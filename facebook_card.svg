<svg xmlns="http://www.w3.org/2000/svg" width="220" height="65" viewBox="0 0 220 65">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad_Facebook" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    
    <!-- Cyberpunk Top Border Gradient -->
    <linearGradient id="cyber_Facebook" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#1877F2" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.2"/>
    </linearGradient>
    
    <!-- Tech Dots Pattern -->
    <pattern id="dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle fill="#ffffff" fill-opacity="0.03" cx="2" cy="2" r="1"></circle>
    </pattern>
  </defs>

  <!-- Main Card Body -->
  <rect x="0" y="4" width="220" height="57" rx="6" fill="url(#bgGrad_Facebook)" stroke="#222" stroke-width="1" />
  
  <!-- Overlay Pattern -->
  <rect x="1" y="5" width="218" height="55" rx="5" fill="url(#dots)" />

  <!-- Neon Top Border Accent -->
  <rect x="1" y="4" width="218" height="2" fill="url(#cyber_Facebook)" />
  
  <!-- Subtle Bottom Glow Line -->
  <rect x="40" y="60" width="140" height="1" fill="#1877F2" fill-opacity="0.4" />

  <!-- Logo Background Circle -->
  <circle cx="35" cy="32.5" r="16" fill="#1877F2" fill-opacity="0.1" stroke="#1877F2" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Icon -->
  <g transform="translate(23, 20.5) scale(0.98)">
    <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" fill="#1877F2" />
  </g>
  
  <!-- Text -->
  <text x="68" y="38" font-family="'JetBrains Mono', 'Segoe UI', Courier, monospace" font-size="15" fill="#E6E6E6" font-weight="700" letter-spacing="2.5">FACEBOOK</text>
  
  <!-- Tech Accents -->
  <rect x="205" y="27" width="2" height="10" fill="#1877F2" fill-opacity="0.6"/>
  <rect x="210" y="30" width="2" height="4" fill="#1877F2" fill-opacity="0.4"/>
</svg>