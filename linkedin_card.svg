      <circle fill="#ffffff" fill-opacity="0.03" cx="2" cy="2" r="1"></circle>
    </pattern>
  </defs>

  <!-- Main Card Body -->
  <rect x="0" y="4" width="220" height="57" rx="6" fill="url(#bgGrad_LinkedIn)" stroke="#222" stroke-width="1" />
  
