<svg xmlns="http://www.w3.org/2000/svg" width="220" height="65" viewBox="0 0 220 65">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad_LinkedIn" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    
    <!-- Cyberpunk Top Border Gradient -->
    <linearGradient id="cyber_LinkedIn" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#0077B5" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.2"/>
    </linearGradient>
    
    <!-- Tech Dots Pattern -->
