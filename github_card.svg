<svg xmlns="http://www.w3.org/2000/svg" width="220" height="65" viewBox="0 0 220 65">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad_GitHub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1A1A" />
      <stop offset="100%" stop-color="#050505" />
    </linearGradient>
    
    <!-- Cyberpunk Top Border Gradient -->
    <linearGradient id="cyber_GitHub" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#8b949e" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00E5FF" stop-opacity="0.2"/>
    </linearGradient>
    
    <!-- Tech Dots Pattern -->
    <pattern id="dots" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle fill="#ffffff" fill-opacity="0.03" cx="2" cy="2" r="1"></circle>
    </pattern>
  </defs>

  <!-- Main Card Body -->
  <rect x="0" y="4" width="220" height="57" rx="6" fill="url(#bgGrad_GitHub)" stroke="#222" stroke-width="1" />
  
  <!-- Overlay Pattern -->
  <rect x="1" y="5" width="218" height="55" rx="5" fill="url(#dots)" />

  <!-- Neon Top Border Accent -->
  <rect x="1" y="4" width="218" height="2" fill="url(#cyber_GitHub)" />
  
  <!-- Subtle Bottom Glow Line -->
  <rect x="40" y="60" width="140" height="1" fill="#8b949e" fill-opacity="0.4" />

  <!-- Logo Background Circle -->
  <circle cx="35" cy="32.5" r="16" fill="#8b949e" fill-opacity="0.1" stroke="#8b949e" stroke-opacity="0.3" stroke-width="1"/>

