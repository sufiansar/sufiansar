  <!-- Text -->
  <text x="68" y="38" font-family="'JetBrains Mono', 'Segoe UI', Courier, monospace" font-size="15" fill="#E6E6E6" font-weight="700" letter-spacing="2.5">GITHUB</text>
  
  <!-- Tech Accents -->
  <rect x="205" y="27" width="2" height="10" fill="#8b949e" fill-opacity="0.6"/>
